<div class="container py-4">
  <!-- FORMULARIO DE REPORTE PDF -->
  <div class="card border-0 shadow-sm p-4 mb-4 mx-auto" style="max-width: 600px;">
    <h2 class="h5 fw-bold mb-4 text-dark text-center">REPORTE DE INTERACCIONES POR WHATSAPP</h2>
    
    <div class="row g-3">
      <!-- Selector de Historial TXT/ZIP -->
      <div class="col-12">
        <label class="form-label small fw-bold text-muted">Subir Historial (TXT o ZIP):</label>
        <label class="modern-drop-zone d-flex align-items-center justify-content-center p-3" [class.has-file]="nombreArchivoHistorial">
          <div class="text-center">
            <i class="bi" [ngClass]="nombreArchivoHistorial ? 'bi-file-earmark-check fs-3 text-primary' : 'bi-cloud-arrow-up fs-3 text-success'"></i>
            <span class="small d-block mt-1 text-truncate" style="max-width: 250px;">
              {{ nombreArchivoHistorial || 'Haz clic para seleccionar archivo' }}
            </span>
          </div>
          <input type="file" class="d-none" (change)="onFileSelected($event)" accept=".txt,.zip" />
        </label>
      </div>

      <!-- Selector de Logo -->
      <div class="col-12" *ngIf="nombreArchivoHistorial">
        <label class="form-label small fw-bold text-muted">Logo de la empresa:</label>
        <label class="modern-drop-zone d-flex align-items-center justify-content-center p-3" [class.has-file]="nombreArchivoLogo">
          <div class="text-center">
            <i class="bi" [ngClass]="nombreArchivoLogo ? 'bi-image-fill fs-3 text-primary' : 'bi-cloud-arrow-up fs-3 text-success'"></i>
            <span class="small d-block mt-1 text-truncate" style="max-width: 250px;">
              {{ nombreArchivoLogo || 'Haz clic para seleccionar un logo' }}
            </span>
          </div>
          <input type="file" class="d-none" (change)="cargarLogo($event)" accept="image/*" />
        </label>
      </div>

      <!-- Fechas -->
      <div class="col-md-6" *ngIf="nombreArchivoHistorial">
        <label class="form-label small fw-bold text-muted">Fecha Inicio:</label>
        <input type="date" class="form-control custom-input" [(ngModel)]="fechaInicio" />
      </div>
      <div class="col-md-6" *ngIf="nombreArchivoHistorial">
        <label class="form-label small fw-bold text-muted">Fecha Fin:</label>
        <input type="date" class="form-control custom-input" [(ngModel)]="fechaFin" />
      </div>

      <!-- Checkbox -->
      <div class="col-12" *ngIf="nombreArchivoHistorial">
        <div class="form-check form-switch mt-2">
          <input class="form-check-input" type="checkbox" role="switch" id="imgCheck" [(ngModel)]="incluirImagenes" />
          <label class="form-check-label fw-bold text-muted" for="imgCheck">Incluir Imágenes en PDF</label>
        </div>
      </div>

      <!-- Botón -->
      <div class="col-12 mt-3" *ngIf="nombreArchivoHistorial">
        <button class="btn-generate w-100 shadow-sm" (click)="generarPDF()">
          GENERAR REPORTE PDF
        </button>
      </div>
    </div>
  </div>

  <!-- PREVIEW CHAT -->
  <div class="preview mx-auto" style="max-width: 600px;">
    <div class="mensaje mb-2" *ngFor="let msg of mensajes">
      <div class="burbuja p-2 shadow-sm">
        <div class="autor small">{{ msg.autor }}</div>
        <div class="texto">{{ msg.mensaje }}</div>
        <img *ngIf="msg.imagen" [src]="msg.imagen" alt="Adjunto" 
             style="max-width: 250px; width: 100%; margin-top: 10px; border-radius: 12px; display: block; border: 1px solid #ddd;" />
        <div class="fecha text-muted">{{ msg.fecha | date: 'dd/MM/yyyy HH:mm' }}</div>
      </div>
    </div>
  </div>
</div>
